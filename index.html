<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f3f1e6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Gravity Defied — Trial Racing</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>

      <!-- ============ MAIN MENU ============ -->
      <div id="menu" class="screen">
        <div class="screen-card">
          <div class="screen-header">
            <button class="icon-btn" data-nav="settings" aria-label="Настройки">⚙</button>
            <span></span>
            <button class="pill-btn" data-nav="leaderboard">♛ ЛИДЕРБОРД</button>
          </div>

          <div class="logo-area">
            <div class="logo-bike">
              <svg viewBox="0 0 240 140" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- speed flicks (motion suggestion behind bike) -->
                <g stroke="#161616" stroke-width="2.4" stroke-linecap="round">
                  <path d="M14 96 L28 96"/>
                  <path d="M12 105 L24 105"/>
                  <path d="M20 113 L32 113"/>
                </g>

                <!-- rear wheel -->
                <g transform="translate(58 108)">
                  <circle r="26" fill="#161616"/>
                  <circle r="18" fill="#ffffff"/>
                  <g fill="#161616">
                    <path d="M0 -2 L-4 -16 L4 -16 Z"/>
                    <path d="M-2 -1 L-15 -8 L-13 -13 Z"/>
                    <path d="M2 -1 L15 -8 L13 -13 Z"/>
                    <path d="M-2 1 L-16 5 L-13 11 Z"/>
                    <path d="M2 1 L16 5 L13 11 Z"/>
                  </g>
                  <circle r="3" fill="#161616"/>
                </g>

                <!-- front wheel -->
                <g transform="translate(180 108)">
                  <circle r="26" fill="#161616"/>
                  <circle r="18" fill="#ffffff"/>
                  <g fill="#161616">
                    <path d="M0 -2 L-4 -16 L4 -16 Z"/>
                    <path d="M-2 -1 L-15 -8 L-13 -13 Z"/>
                    <path d="M2 -1 L15 -8 L13 -13 Z"/>
                    <path d="M-2 1 L-16 5 L-13 11 Z"/>
                    <path d="M2 1 L16 5 L13 11 Z"/>
                  </g>
                  <circle r="3" fill="#161616"/>
                </g>

                <!-- rear fender (curve above rear wheel) -->
                <path d="M32 90 Q42 76 65 74 L92 73" fill="none" stroke="#161616" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

                <!-- bike frame body -->
                <path d="M50 102 L65 92 L90 88 L105 86 L122 84 L140 80 L168 76 L192 86 L200 96 L196 104 L178 104 L174 102 L78 102 Z"
                      fill="#ffffff" stroke="#161616" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

                <!-- engine cradle (suggests interior frame) -->
                <path d="M110 88 L140 87 L144 100 L108 100 Z" fill="none" stroke="#161616" stroke-width="2"/>

                <!-- front fender -->
                <path d="M162 82 Q178 76 198 82" fill="none" stroke="#161616" stroke-width="3" stroke-linecap="round"/>

                <!-- red side panel triangle accent -->
                <path d="M122 84 L144 80 L130 96 Z" fill="#e63a30"/>

                <!-- rear shock (small red diagonal) -->
                <path d="M93 70 L96 92" stroke="#e63a30" stroke-width="4" stroke-linecap="round"/>

                <!-- front fork (prominent red) -->
                <path d="M168 60 L182 106" stroke="#e63a30" stroke-width="5" stroke-linecap="round"/>

                <!-- handlebar -->
                <path d="M170 56 Q178 50 188 48" fill="none" stroke="#161616" stroke-width="3" stroke-linecap="round"/>
                <circle cx="188" cy="48" r="3.5" fill="#161616"/>

                <!-- rider lower body (blue pants) -->
                <path d="M102 78 L117 62 L134 60 L132 80 L122 94 L106 92 Z"
                      fill="#1f7ed3" stroke="#161616" stroke-width="2.5" stroke-linejoin="round"/>
                <!-- knee white accent -->
                <path d="M120 76 L130 74 L128 86 L118 88 Z" fill="#ffffff"/>

                <!-- rider torso (blue jersey) -->
                <path d="M118 62 L124 38 L144 35 L150 52 L144 62 Z"
                      fill="#1f7ed3" stroke="#161616" stroke-width="2.5" stroke-linejoin="round"/>

                <!-- right arm (white sleeve) -->
                <path d="M145 38 L167 52 L168 62 L153 56 Z"
                      fill="#ffffff" stroke="#161616" stroke-width="2.5" stroke-linejoin="round"/>

                <!-- glove on grip -->
                <ellipse cx="170" cy="60" rx="5.5" ry="4.5" fill="#161616"/>

                <!-- helmet shell (yellow MX style) -->
                <path d="M142 30 Q140 18 152 14 Q168 11 176 18 Q180 26 176 34 L172 40 L144 42 Z"
                      fill="#f5c130" stroke="#161616" stroke-width="2.5" stroke-linejoin="round"/>
                <!-- visor cutout (white face area) -->
                <path d="M158 28 L174 26 L174 34 L162 36 Z" fill="#ffffff" stroke="#161616" stroke-width="2"/>
                <!-- helmet peak -->
                <path d="M168 14 L184 18 L182 22" fill="#f5c130" stroke="#161616" stroke-width="2" stroke-linejoin="round"/>
                <!-- chin / jaw outline -->
                <path d="M152 38 L164 42 L168 36" fill="none" stroke="#161616" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <h1>Gravity Defied</h1>
            <p class="tagline">Trial Racing</p>
          </div>

          <div class="menu-buttons">
            <button class="big-btn" data-nav="play"><span class="icon">▶</span> ИГРАТЬ</button>
            <button class="big-btn" data-nav="tracks"><span class="icon">♛</span> ТРАССЫ</button>
            <button class="big-btn" data-nav="leaderboard"><span class="icon">♛</span> ЛИДЕРБОРД</button>
            <button class="big-btn" data-nav="settings"><span class="icon">⚙</span> НАСТРОЙКИ</button>
            <button class="big-btn" data-nav="exit"><span class="icon">⤳</span> ВЫХОД</button>
          </div>

          <div class="menu-social">
            <button class="icon-btn" aria-label="Игры">◰</button>
            <button class="icon-btn" aria-label="VK">VK</button>
            <button class="icon-btn" aria-label="YouTube">▶</button>
            <button class="icon-btn" aria-label="Звезда">★</button>
          </div>

          <div class="screen-mountains"></div>
        </div>
      </div>

      <!-- ============ TRACKS ============ -->
      <div id="tracks" class="screen hidden">
        <div class="screen-card">
          <div class="screen-header">
            <button class="icon-btn" data-nav="menu" aria-label="Назад">←</button>
            <h2>Выбор трассы</h2>
            <span class="stars-count" id="tracks-stars">★ 0/15</span>
          </div>

          <div class="tracks-grid" id="tracks-grid"></div>

          <div class="pagination">
            <button class="icon-btn" aria-label="Пред." disabled style="opacity:.4">‹</button>
            <div class="dots"><span class="dot active"></span></div>
            <button class="icon-btn" aria-label="След." disabled style="opacity:.4">›</button>
          </div>

          <div class="screen-mountains"></div>
        </div>
      </div>

      <!-- ============ HUD (in-game) ============ -->
      <div id="hud" class="hud hidden">
        <div class="hud-top">
          <button class="icon-btn" id="hud-pause" aria-label="Пауза">II</button>
          <div class="hud-timer">
            <div class="live" id="hud-time">0:00.00</div>
            <div class="target" id="hud-target">★ 0:35.00</div>
          </div>
          <button class="icon-btn" id="hud-restart" aria-label="Рестарт">↺</button>
          <div class="hud-score" id="hud-score">★ 0</div>
        </div>
        <div class="hud-bottom" id="hud-controls">
          <button class="ctrl-btn" data-act="leanBack" aria-label="Наклон назад">←</button>
          <button class="ctrl-btn" data-act="leanFwd" aria-label="Наклон вперёд">→</button>
          <button class="ctrl-btn" data-act="brake" aria-label="Тормоз">◉</button>
          <button class="ctrl-btn gas" data-act="gas" aria-label="Газ">▶</button>
        </div>
      </div>

      <!-- ============ PAUSE ============ -->
      <div id="pause" class="screen hidden">
        <div class="screen-card">
          <div class="screen-header">
            <span></span>
            <h2>ПАУЗА</h2>
            <span></span>
          </div>
          <div class="pause-buttons">
            <button class="big-btn" data-nav="resume"><span class="icon">▶</span> ПРОДОЛЖИТЬ</button>
            <button class="big-btn" data-nav="restart"><span class="icon">↺</span> РЕСТАРТ</button>
            <button class="big-btn" data-nav="tracks"><span class="icon">♛</span> ВЫЙТИ НА КАРТУ</button>
            <button class="big-btn" data-nav="menu"><span class="icon">⌂</span> ГЛАВНОЕ МЕНЮ</button>
          </div>
          <div class="screen-mountains"></div>
        </div>
      </div>

      <!-- ============ LEADERBOARD ============ -->
      <div id="leaderboard" class="screen hidden">
        <div class="screen-card">
          <div class="screen-header">
            <button class="icon-btn" data-nav="menu" aria-label="Назад">←</button>
            <h2>Лидерборд</h2>
            <span></span>
          </div>
          <div class="lb-tabs">
            <button class="lb-tab active" data-lb-tab="global">Глобальный</button>
            <button class="lb-tab" data-lb-tab="friends">Друзья</button>
          </div>
          <div class="lb-list" id="lb-list"></div>
          <div class="screen-mountains"></div>
        </div>
      </div>

      <!-- ============ FINISH ============ -->
      <div id="finish" class="screen hidden">
        <div class="screen-card">
          <div class="screen-header">
            <span></span>
            <h2 id="finish-title">FINISH</h2>
            <span></span>
          </div>
          <div style="padding:0 4px;">
            <div class="finish-row"><span>Время:</span> <strong id="finish-time">—</strong></div>
            <div class="finish-row"><span>Лучшее:</span> <strong id="finish-best">—</strong></div>
          </div>
          <div class="finish-actions">
            <button class="big-btn" id="btn-restart"><span class="icon">↺</span> ЗАНОВО</button>
            <button class="big-btn" id="btn-next"><span class="icon">→</span> СЛЕД.</button>
            <button class="big-btn" id="btn-tomenu"><span class="icon">♛</span> ТРАССЫ</button>
            <button class="big-btn" id="btn-tomain"><span class="icon">⌂</span> МЕНЮ</button>
          </div>
          <div class="screen-mountains"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
